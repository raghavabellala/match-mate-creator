name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Lovable Cloud (Supabase) public keys are baked into the static build.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://expciafblygbqmuacoqq.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cGNpYWZibHlnYnFtdWFjb3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MjkxNDcsImV4cCI6MjA3ODIwNTE0N30.1bvfCB1Zu6VhTdObbNcPdTd3BlnaE5o7oNEM2Mj2a4w' }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID || 'expciafblygbqmuacoqq' }}

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - name: Preserve CNAME for custom domain
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
